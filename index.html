<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
body { background: #f4f4f4; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 16px; }
.header { background: #c0392b; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px #0003; }
.header-left { display: flex; align-items: center; gap: 10px; }
.btn-logout { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.login-box { background: #fff; border-radius: 16px; padding: 32px 24px; margin: 40px auto; max-width: 400px; box-shadow: 0 4px 24px #0001; }
.login-box h2 { color: #c0392b; font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-box .sub { color: #aaa; font-size: 13px; text-align: center; margin-bottom: 24px; }
.emoji { font-size: 48px; text-align: center; margin-bottom: 12px; }
.inp { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; margin-bottom: 10px; }
.inp:focus { outline: none; border-color: #c0392b; }
.btn-primary { width: 100%; padding: 12px; background: #c0392b; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-secondary { width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.divider { border-top: 1px solid #eee; margin: 20px 0; }
.divider-label { text-align: center; color: #888; font-size: 13px; margin-bottom: 12px; font-weight: 600; }
.error { color: #e74c3c; font-size: 13px; margin: 6px 0; }
.success { color: #27ae60; font-size: 13px; margin: 6px 0; }
.tabs { display: flex; gap: 6px; margin: 16px 0; flex-wrap: wrap; }
.tab { padding: 7px 14px; border-radius: 8px; border: none; background: #e0e0e0; color: #444; cursor: pointer; font-size: 13px; }
.tab.active { background: #c0392b; color: #fff; font-weight: 700; }
.card { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #eee; }
.card.guardado { border-left: 3px solid #2ecc71; }
.grupo-title { font-weight: 700; color: #c0392b; font-size: 14px; margin: 16px 0 8px; }
.partido-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.equipo { flex: 1; font-size: 13px; font-weight: 600; min-width: 90px; }
.equipo.right { text-align: right; }
.goles-inp { width: 46px; padding: 6px 4px; text-align: center; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; }
.dash { color: #aaa; font-weight: 700; }
.btn-ok { padding: 6px 12px; background: #3498db; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; }
.resultado-real { font-size: 12px; color: #888; }
.pts-badge { font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 5px; }
.pts-badge.verde { background: #eafaf1; color: #27ae60; }
.pts-badge.rojo { background: #fdf0f0; color: #e74c3c; }
.fecha-info { font-size: 11px; color: #aaa; width: 100%; margin-top: 4px; }
.penales-row { width: 100%; margin-top: 6px; font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; }
.penales-sel { padding: 4px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; background: #fff; }
.tabla-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; background: #fafafa; border: 1px solid #eee; margin-bottom: 8px; }
.tabla-row.me { background: #eaf4ff; border: 2px solid #3498db; }
.tabla-pos { font-size: 18px; min-width: 30px; text-align: center; }
.tabla-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.tabla-nombre { flex: 1; font-weight: 600; font-size: 14px; }
.tabla-pts { font-weight: 800; font-size: 22px; color: #c0392b; }
.tabla-pts-label { color: #aaa; font-size: 13px; }
.flash { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: #fff; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; z-index: 999; box-shadow: 0 4px 12px #0003; }
.loading { text-align: center; padding: 40px; color: #aaa; }
.spinner { font-size: 36px; animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.info-box { background: #f0f7ff; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #3498db; }
.puntos-ref { background: #f9f9f9; border-radius: 8px; padding: 10px 14px; margin-top: 14px; font-size: 12px; color: #888; }
.sol-card { background: #fffdf0; border: 1.5px solid #f39c12; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.sol-info { font-size: 14px; }
.sol-info strong { font-size: 15px; }
.sol-info small { color: #aaa; font-size: 12px; display: block; margin-top: 2px; }
.btn-aprobar { padding: 7px 14px; background: #27ae60; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; margin-right: 6px; }
.btn-rechazar { padding: 7px 14px; background: #e74c3c; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; }
.pw-badge { background: #f0f0f0; border-radius: 6px; padding: 3px 8px; font-size: 12px; font-family: monospace; margin-top: 4px; display: inline-block; }
.grupos-tabla { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px #0001; }
.grupos-tabla th { background: #c0392b; color: #fff; padding: 8px 6px; text-align: center; }
.grupos-tabla th:first-child { text-align: left; padding-left: 10px; }
.grupos-tabla td { padding: 7px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
.grupos-tabla td:first-child { text-align: left; padding-left: 10px; font-weight: 500; }
.grupos-tabla tr.clasificado { background: #eafaf1; }
.grupos-tabla tr.clasificado td:first-child { font-weight: 700; }
.pts-col { font-weight: 800; color: #c0392b; }
</style>
</head>
<body>
<div id="app"></div>
<script>
var API_URL = "https://script.google.com/macros/s/AKfycbzOvBbw0swCb9oOaD7bbdrtNW-aMQw8cvVJqHlMdo8i13U_icwP1VQORc7NuanmO5w/exec";

var state = {
  view: "login", me: null, fixture: [], pronosticos: {}, tabla: [], solicitudes: [],
  tab: "grupos", loading: false, flash: null,
  loginForm: { u: "", p: "" }, solForm: { nombre: "", password: "", password2: "" },
  loginErr: "", solMsg: "", drafts: {}, penalesDraft: {}
};

function apiGet(params) {
  var qs = Object.keys(params).map(function(k) { return k + "=" + encodeURIComponent(params[k]); }).join("&");
  return fetch(API_URL + "?" + qs).then(function(r) { return r.json(); });
}
function apiPost(data) {
  return fetch(API_URL, { method: "POST", body: JSON.stringify(data) }).then(function(r) { return r.json(); });
}
function flash(msg, color) {
  state.flash = { msg: msg, color: color || "#27ae60" };
  render();
  setTimeout(function() { state.flash = null; render(); }, 2500);
}

function doLogin() {
  state.loginErr = ""; render();
  apiGet({ action: "login", usuario: state.loginForm.u, password: state.loginForm.p })
    .then(function(res) {
      if (res.ok) {
        state.me = res; state.me.username = state.loginForm.u;
        state.view = res.isAdmin ? "admin" : "usuario";
        state.tab = res.isAdmin ? "solicitudes" : "grupos";
        loadData();
      } else { state.loginErr = res.error || "Usuario o contrasena incorrectos"; render(); }
    }).catch(function() { state.loginErr = "Error de conexion. Intenta de nuevo."; render(); });
}

function doSolicitud() {
  var nombre = state.solForm.nombre.trim();
  var pw = state.solForm.password, pw2 = state.solForm.password2;
  if (!nombre) { state.solMsg = "Ingresa tu nombre o apodo."; render(); return; }
  if (!pw || pw.length < 4) { state.solMsg = "La contrasena debe tener al menos 4 caracteres."; render(); return; }
  if (pw !== pw2) { state.solMsg = "Las contrasenas no coinciden."; render(); return; }
  var usuario = nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"").replace(/[^a-z0-9]/g,"");
  apiPost({ action: "solicitarAcceso", usuario: usuario, nombre: nombre, password: pw })
    .then(function(res) {
      state.solMsg = res.ok ? "Solicitud enviada! El admin te aprueba pronto. Tu usuario sera: " + usuario : (res.error || "Error");
      render();
    }).catch(function() { state.solMsg = "Error de conexion."; render(); });
}

function loadData() {
  state.loading = true;
  var cachedFixture = sessionStorage.getItem("prode_fixture");
  if (cachedFixture) {
    state.fixture = JSON.parse(cachedFixture);
    state.loading = false; render();
    cargarResto();
  } else {
    render();
    apiGet({ action: "getFixture" }).then(function(res) {
      if (res.ok) { state.fixture = res.partidos; sessionStorage.setItem("prode_fixture", JSON.stringify(res.partidos)); }
      state.loading = false; render();
      cargarResto();
    }).catch(function() { state.loading = false; render(); });
  }
}

function cargarResto() {
  var promises = [apiGet({ action: "getTabla" })];
  if (state.me && !state.me.isAdmin) promises.push(apiGet({ action: "getPronosticos", usuario: state.me.username }));
  if (state.me && state.me.isAdmin) promises.push(apiGet({ action: "getSolicitudes" }));
  Promise.all(promises).then(function(results) {
    if (results[0] && results[0].ok) state.tabla = results[0].tabla;
    if (results[1] && results[1].ok) {
      if (state.me.isAdmin) state.solicitudes = results[1].solicitudes;
      else state.pronosticos = results[1].pronosticos;
    }
    render();
  }).catch(function() {});
}

// ── HELPERS ────────────────────────────────────────────────────
function getGanador(g1, g2, penales) {
  if (g1 > g2) return "local";
  if (g1 < g2) return "visitante";
  return penales || null;
}

var PUNTOS = { Grupos:{exacto:3,resultado:1},"16avos":{exacto:4,resultado:2},Octavos:{exacto:5,resultado:2},Cuartos:{exacto:7,resultado:3},Semis:{exacto:9,resultado:4},Tercero:{exacto:9,resultado:4},Final:{exacto:15,resultado:6} };

function calcPts(prono, partido) {
  if (!prono || partido.golesLocal === "" || partido.golesVisit === "") return null;
  var p = PUNTOS[partido.fase] || PUNTOS.Grupos;
  var g1r = Number(partido.golesLocal), g2r = Number(partido.golesVisit);
  var g1p = Number(prono.g1), g2p = Number(prono.g2);

  if (partido.fase === "Grupos") {
    if (g1p === g1r && g2p === g2r) return p.exacto;
    return Math.sign(g1p-g2p) === Math.sign(g1r-g2r) ? p.resultado : 0;
  }

  // Eliminatorias
  var realGana = getGanador(g1r, g2r, partido.penales);
  var pronoGana = getGanador(g1p, g2p, prono.penales);
  if (!realGana || !pronoGana) return null;

  var exactScore = g1p === g1r && g2p === g2r;
  var exactPenales = (g1r !== g2r) || (prono.penales === partido.penales);
  if (exactScore && exactPenales) return p.exacto;
  if (pronoGana === realGana) return p.resultado;
  return 0;
}

function partidoEmpezado(p) {
  try {
    var parts = p.fecha.split("/");
    var matchUTC = new Date(Date.UTC(2026, parseInt(parts[1])-1, parseInt(parts[0]), parseInt(p.hora.split(":")[0])+5, parseInt(p.hora.split(":")[1])));
    return new Date() > matchUTC;
  } catch(e) { return false; }
}

function sortKey(p) {
  try {
    var parts = p.fecha.split("/");
    return "2026" + parts[1].padStart(2,"0") + parts[0].padStart(2,"0") + p.hora.replace(":","").padStart(4,"0");
  } catch(e) { return ""; }
}

function getGrupos() {
  var g = [];
  state.fixture.forEach(function(p) { if (p.fase === "Grupos" && g.indexOf(p.grupo) < 0) g.push(p.grupo); });
  return g.sort();
}
function getFases() {
  var orden = ["16avos","Octavos","Cuartos","Semis","Tercero","Final"], fases = [];
  orden.forEach(function(f) { if (state.fixture.some(function(p) { return p.fase === f; })) fases.push(f); });
  return fases;
}
function avatarColor(n) {
  var c = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#16a085"];
  return c[(n||"A").charCodeAt(0) % c.length];
}

// ── GUARDAR PRONO ──────────────────────────────────────────────
function guardarProno(partido) {
  var d = state.drafts[partido.id] || {};
  var saved = state.pronosticos[partido.id] || {};
  var g1 = d.g1 !== undefined ? d.g1 : saved.g1;
  var g2 = d.g2 !== undefined ? d.g2 : saved.g2;
  var penales = state.penalesDraft[partido.id] !== undefined ? state.penalesDraft[partido.id] : (saved.penales || "");
  if (g1 === "" || g1 === undefined || g2 === "" || g2 === undefined) { flash("Completa ambos goles", "#e74c3c"); return; }
  if (partido.fase !== "Grupos" && Number(g1) === Number(g2) && !penales) { flash("Predijiste empate — elegi quien gana en penales", "#e74c3c"); return; }
  state.pronosticos[partido.id] = { g1: Number(g1), g2: Number(g2), penales: penales };
  delete state.drafts[partido.id]; delete state.penalesDraft[partido.id];
  flash("Guardado"); render();
  apiPost({ action: "guardarPronostico", usuario: state.me.username, partidoId: partido.id, g1: Number(g1), g2: Number(g2), penales: penales })
    .catch(function() { flash("Error al guardar, intenta de nuevo", "#e74c3c"); });
}

function aprobarUsuario(usuario, nombre) {
  apiPost({ action: "aprobarUsuario", usuario: usuario }).then(function(res) {
    if (res.ok) { flash(nombre + " aprobado"); state.solicitudes = state.solicitudes.filter(function(s) { return s.usuario !== usuario; }); render(); }
    else flash("Error: " + (res.error||""), "#e74c3c");
  });
}
function rechazarUsuario(usuario) {
  apiPost({ action: "rechazarUsuario", usuario: usuario }).then(function(res) {
    if (res.ok) { state.solicitudes = state.solicitudes.filter(function(s) { return s.usuario !== usuario; }); flash("Rechazado"); render(); }
  });
}

// ── POSICIONES DE GRUPOS ───────────────────────────────────────
function calcPosicionesGrupos() {
  var grupos = {};
  state.fixture.filter(function(p) { return p.fase === "Grupos"; }).forEach(function(p) {
    if (!grupos[p.grupo]) grupos[p.grupo] = {};
    if (!grupos[p.grupo][p.local]) grupos[p.grupo][p.local] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
    if (!grupos[p.grupo][p.visitante]) grupos[p.grupo][p.visitante] = {pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};
    if (p.golesLocal === "" || p.golesVisit === "") return;
    var g1 = Number(p.golesLocal), g2 = Number(p.golesVisit);
    var tL = grupos[p.grupo][p.local], tV = grupos[p.grupo][p.visitante];
    tL.pj++; tV.pj++; tL.gf += g1; tL.gc += g2; tV.gf += g2; tV.gc += g1;
    if (g1 > g2) { tL.pg++; tL.pts += 3; tV.pp++; }
    else if (g1 < g2) { tV.pg++; tV.pts += 3; tL.pp++; }
    else { tL.pe++; tV.pe++; tL.pts++; tV.pts++; }
  });
  return grupos;
}

function renderPosicionesGrupos() {
  var grupos = calcPosicionesGrupos();
  var grpKeys = Object.keys(grupos).sort();
  if (!grpKeys.length) return '<p style="color:#aaa;padding:20px">Aun no hay resultados cargados.</p>';
  var html = "";
  grpKeys.forEach(function(grp) {
    var eqKeys = Object.keys(grupos[grp]);
    var arr = [];
    eqKeys.forEach(function(eq) { arr.push({ nombre: eq, t: grupos[grp][eq] }); });
    arr.sort(function(a,b) {
      if (b.t.pts !== a.t.pts) return b.t.pts - a.t.pts;
      var gdA = a.t.gf-a.t.gc, gdB = b.t.gf-b.t.gc;
      if (gdB !== gdA) return gdB - gdA;
      return b.t.gf - a.t.gf;
    });
    html += '<div class="grupo-title">Grupo ' + grp + '</div>';
    html += '<table class="grupos-tabla"><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr>';
    arr.forEach(function(e, i) {
      var t = e.t;
      html += '<tr class="' + (i<2?"clasificado":"") + '">' +
        '<td>' + (i<2?'<span style="color:#27ae60">&#10003;</span> ':"") + e.nombre + '</td>' +
        '<td>' + t.pj + '</td><td>' + t.pg + '</td><td>' + t.pe + '</td><td>' + t.pp + '</td>' +
        '<td>' + t.gf + '</td><td>' + t.gc + '</td><td>' + (t.gf-t.gc) + '</td>' +
        '<td class="pts-col">' + t.pts + '</td></tr>';
    });
    html += '</table>';
  });
  return html;
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  var html = "";
  if (state.flash) html += '<div class="flash" style="background:' + state.flash.color + '">' + state.flash.msg + '</div>';
  if (state.view === "login") html += renderLogin();
  else if (state.view === "usuario") html += renderHeader() + renderUsuario();
  else if (state.view === "admin") html += renderHeader() + renderAdmin();
  document.getElementById("app").innerHTML = html;
  bindEvents();
}

function renderLogin() {
  return '<div class="container"><div class="login-box">' +
    '<div class="emoji">&#9917;</div>' +
    '<h2>Prode Mundial 2026</h2><p class="sub">Solo usuarios habilitados</p>' +
    '<input class="inp" id="inp-u" type="text" placeholder="Usuario" value="' + state.loginForm.u + '">' +
    '<input class="inp" id="inp-p" type="password" placeholder="Contrasena" value="' + state.loginForm.p + '">' +
    (state.loginErr ? '<p class="error">' + state.loginErr + '</p>' : '') +
    '<button class="btn-primary" id="btn-login">Entrar</button>' +
    '<div class="divider"></div><p class="divider-label">No tenes acceso? Pedile al admin</p>' +
    '<input class="inp" id="inp-sn" type="text" placeholder="Tu nombre o apodo (ej: Juan Pablo)" value="' + state.solForm.nombre + '">' +
    '<input class="inp" id="inp-sp" type="password" placeholder="Elegi una contrasena" value="' + (state.solForm.password||"") + '">' +
    '<input class="inp" id="inp-sp2" type="password" placeholder="Repeti la contrasena" value="' + (state.solForm.password2||"") + '">' +
    '<button class="btn-secondary" id="btn-solicitar">Solicitar acceso</button>' +
    (state.solMsg ? '<p class="' + (state.solMsg.includes("enviada") ? "success" : "error") + '">' + state.solMsg + '</p>' : '') +
    '</div></div>';
}

function renderHeader() {
  var nombre = state.me ? state.me.displayName : "";
  var entry = state.tabla.find(function(t) { return t.nombre === nombre; });
  var pos = (!state.me.isAdmin && entry) ? " #" + (state.tabla.indexOf(entry)+1) + " " + entry.pts + "pts" : "";
  return '<div class="header"><div class="header-left">' +
    '<div style="width:34px;height:34px;border-radius:50%;background:' + avatarColor(nombre) + ';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px">' + (nombre[0]||"?").toUpperCase() + '</div>' +
    '<div><div style="font-weight:700;font-size:15px">' + nombre + '</div><div style="font-size:11px;opacity:0.8">' + (state.me.isAdmin ? "Admin" : "Jugador" + pos) + '</div></div>' +
    '</div><button class="btn-logout" id="btn-logout">Salir</button></div>';
}

function renderUsuario() {
  var fases = getFases();
  var tabs = ["grupos"].concat(fases).concat(["posiciones","tabla"]);
  var html = '<div class="container"><div class="tabs">';
  tabs.forEach(function(t) {
    var label = t === "tabla" ? "Tabla" : t === "posiciones" ? "Posiciones" : t;
    html += '<button class="tab ' + (state.tab===t?"active":"") + '" data-tab="' + t + '">' + label + '</button>';
  });
  html += '</div>';

  if (state.loading) { html += '<div class="loading"><div class="spinner">&#9917;</div><p>Cargando...</p></div>'; }
  else if (state.tab === "tabla") { html += renderTabla(); }
  else if (state.tab === "posiciones") { html += renderPosicionesGrupos(); }
  else if (state.tab === "grupos") {
    html += '<div class="info-box">Verde = guardado. Exacto: 3pts. Solo resultado: 1pt</div>';
    var pg = state.fixture.filter(function(p) { return p.fase === "Grupos"; });
    pg.sort(function(a,b) { var ka=sortKey(a),kb=sortKey(b); return ka<kb?-1:ka>kb?1:0; });
    var fechaActual = "";
    pg.forEach(function(p) {
      if (p.fecha !== fechaActual) { fechaActual = p.fecha; html += '<div class="grupo-title">&#128197; ' + p.fecha + '</div>'; }
      html += renderPartido(p);
    });
  } else {
    var ptsInfo = PUNTOS[state.tab] || {};
    html += '<div class="info-box">Exacto: ' + ptsInfo.exacto + 'pts. Solo resultado: ' + ptsInfo.resultado + 'pts. En eliminatorias, si hay empate se juegan penales.</div>';
    state.fixture.filter(function(p) { return p.fase === state.tab; }).forEach(function(p) { html += renderPartido(p); });
  }
  html += '<div class="puntos-ref">Grupos: 3/1 - 16avos: 4/2 - Octavos: 5/2 - Cuartos: 7/3 - Semis: 9/4 - Final: 15/6</div></div>';
  return html;
}

function renderPartido(p) {
  var saved = state.pronosticos[p.id], draft = state.drafts[p.id] || {};
  var empezado = partidoEmpezado(p);
  var bloqueado = saved || empezado;
  var g1 = draft.g1 !== undefined ? draft.g1 : (saved ? saved.g1 : "");
  var g2 = draft.g2 !== undefined ? draft.g2 : (saved ? saved.g2 : "");
  var pts = calcPts(saved, p);
  var tieneRes = p.golesLocal !== "" && p.golesVisit !== "";
  var bgColor = saved ? "#eafaf1" : empezado ? "#f5f5f5" : "#fff";
  var estadoBadge = saved
    ? '<span style="font-size:12px;color:#27ae60;font-weight:700">&#10003; Guardado</span>'
    : empezado ? '<span style="font-size:12px;color:#e74c3c;font-weight:700">&#128274; Cerrado</span>'
    : '<button class="btn-ok" data-pid="' + p.id + '" data-action="guardar">OK</button>';

  var esElim = p.fase !== "Grupos";
  var savedPenales = saved ? (saved.penales || "") : "";
  var draftPenales = state.penalesDraft[p.id] !== undefined ? state.penalesDraft[p.id] : savedPenales;
  var penalesHtml = "";
  if (esElim) {
    penalesHtml = '<div class="penales-row">' +
      '<span>&#x26BD; Penales (si empate):</span>' +
      '<select class="penales-sel" data-pid="' + p.id + '" data-action="penales" ' + (bloqueado?"disabled":"") + '>' +
      '<option value="">— Elegir —</option>' +
      '<option value="local" ' + (draftPenales==="local"?"selected":"") + '>' + p.local + '</option>' +
      '<option value="visitante" ' + (draftPenales==="visitante"?"selected":"") + '>' + p.visitante + '</option>' +
      '</select>' +
      (saved && saved.penales ? '<span style="color:#27ae60;font-size:11px">&#10003; ' + (saved.penales==="local"?p.local:p.visitante) + '</span>' : '') +
      (tieneRes && p.penales ? '<span style="color:#888;font-size:11px">Real: ' + (p.penales==="local"?p.local:p.visitante) + '</span>' : '') +
      '</div>';
  }

  return '<div class="card ' + (saved?"guardado":"") + '">' +
    '<div class="partido-row">' +
    '<span class="equipo right">' + p.local + '</span>' +
    '<input class="goles-inp" style="background:' + bgColor + ';cursor:' + (bloqueado?"not-allowed":"text") + '" type="number" min="0" max="20" value="' + g1 + '" data-pid="' + p.id + '" data-g="g1" ' + (bloqueado?"readonly":"") + '>' +
    '<span class="dash">-</span>' +
    '<input class="goles-inp" style="background:' + bgColor + ';cursor:' + (bloqueado?"not-allowed":"text") + '" type="number" min="0" max="20" value="' + g2 + '" data-pid="' + p.id + '" data-g="g2" ' + (bloqueado?"readonly":"") + '>' +
    '<span class="equipo">' + p.visitante + '</span>' +
    estadoBadge +
    (tieneRes ? '<span class="resultado-real">' + p.golesLocal + '-' + p.golesVisit + '</span>' : '') +
    (pts !== null ? '<span class="pts-badge ' + (pts>0?"verde":"rojo") + '">' + (pts>0?"+"+pts:0) + 'pts</span>' : '') +
    '</div>' +
    penalesHtml +
    '<div class="fecha-info">&#128197; ' + p.fecha + ' ' + p.hora + 'hs EST - ' + p.estadio + '</div></div>';
}

function renderTabla() {
  if (!state.tabla.length) return '<p style="color:#aaa;padding:20px">Aun no hay puntos cargados.</p>';
  var medals = ["1ro","2do","3ro"];
  var html = '<div style="font-weight:700;font-size:16px;color:#c0392b;margin-bottom:12px">Tabla de posiciones</div>';
  state.tabla.forEach(function(u, i) {
    var esYo = state.me && u.nombre === state.me.displayName;
    html += '<div class="tabla-row ' + (esYo?"me":"") + '">' +
      '<span class="tabla-pos">' + (medals[i]||u.pos) + '</span>' +
      '<div class="tabla-avatar" style="background:' + avatarColor(u.nombre) + '">' + (u.nombre[0]||"?").toUpperCase() + '</div>' +
      '<span class="tabla-nombre">' + u.nombre + '</span>' +
      '<span class="tabla-pts">' + u.pts + '</span>' +
      '<span class="tabla-pts-label">pts</span></div>';
  });
  return html;
}

function renderAdmin() {
  var html = '<div class="container"><div class="tabs">';
  ["solicitudes","tabla"].forEach(function(t) {
    var label = t === "solicitudes" ? "Solicitudes (" + (state.solicitudes ? state.solicitudes.length : 0) + ")" : "Tabla";
    html += '<button class="tab ' + (state.tab===t?"active":"") + '" data-tab="' + t + '">' + label + '</button>';
  });
  html += '</div>';
  if (state.loading) { html += '<div class="loading"><div class="spinner">&#9917;</div><p>Cargando...</p></div>'; }
  else if (state.tab === "solicitudes") {
    if (!state.solicitudes || !state.solicitudes.length) {
      html += '<p style="color:#aaa;padding:20px">No hay solicitudes pendientes.</p>';
    } else {
      state.solicitudes.forEach(function(s) {
        html += '<div class="sol-card"><div class="sol-info"><strong>' + s.nombre + '</strong> <span style="color:#888">@' + s.usuario + '</span><small>' + s.fecha + '</small><span class="pw-badge">pw: ' + s.password + '</span></div>' +
          '<div><button class="btn-aprobar" data-usuario="' + s.usuario + '" data-nombre="' + s.nombre + '" data-action="aprobar">Aprobar</button>' +
          '<button class="btn-rechazar" data-usuario="' + s.usuario + '" data-action="rechazar">Rechazar</button></div></div>';
      });
    }
  } else {
    html += '<button id="btn-actualizar-tabla" style="margin-bottom:16px;padding:10px 20px;background:#27ae60;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px">&#8635; Actualizar tabla ahora</button>';
    html += renderTabla();
  }
  return html + '</div>';
}

function bindEvents() {
  var btnLogin = document.getElementById("btn-login");
  if (btnLogin) btnLogin.onclick = function() {
    state.loginForm.u = document.getElementById("inp-u").value;
    state.loginForm.p = document.getElementById("inp-p").value;
    doLogin();
  };
  var inpP = document.getElementById("inp-p");
  if (inpP) inpP.onkeydown = function(e) { if (e.key==="Enter") { state.loginForm.u=document.getElementById("inp-u").value; state.loginForm.p=inpP.value; doLogin(); } };
  var btnSol = document.getElementById("btn-solicitar");
  if (btnSol) btnSol.onclick = function() {
    state.solForm.nombre = document.getElementById("inp-sn").value;
    state.solForm.password = document.getElementById("inp-sp").value;
    state.solForm.password2 = document.getElementById("inp-sp2").value;
    doSolicitud();
  };
  var btnOut = document.getElementById("btn-logout");
  if (btnOut) btnOut.onclick = function() {
    state.view="login"; state.me=null; state.fixture=[]; state.pronosticos={}; state.tabla=[]; state.drafts={}; state.penalesDraft={}; state.solicitudes=[];
    state.loginForm={u:"",p:""}; render();
  };
  document.querySelectorAll(".tab").forEach(function(btn) { btn.onclick = function() { state.tab=this.dataset.tab; render(); }; });
  document.querySelectorAll(".goles-inp").forEach(function(inp) {
    inp.oninput = function() {
      var pid=this.dataset.pid, g=this.dataset.g;
      if (!state.drafts[pid]) state.drafts[pid]={};
      state.drafts[pid][g] = this.value===""?"":parseInt(this.value);
    };
  });
  document.querySelectorAll("[data-action='guardar']").forEach(function(btn) {
    btn.onclick = function() {
      var pid=this.dataset.pid;
      var partido=state.fixture.find(function(p) { return String(p.id)===String(pid); });
      if (partido) guardarProno(partido);
    };
  });
  document.querySelectorAll("[data-action='penales']").forEach(function(sel) {
    sel.onchange = function() { state.penalesDraft[this.dataset.pid] = this.value; };
  });
  document.querySelectorAll("[data-action='aprobar']").forEach(function(btn) {
    btn.onclick = function() { aprobarUsuario(this.dataset.usuario, this.dataset.nombre); };
  });
  document.querySelectorAll("[data-action='rechazar']").forEach(function(btn) {
    btn.onclick = function() { rechazarUsuario(this.dataset.usuario); };
  });
  var btnActTabla = document.getElementById("btn-actualizar-tabla");
  if (btnActTabla) btnActTabla.onclick = function() {
    btnActTabla.textContent = "Actualizando..."; btnActTabla.disabled = true;
    apiPost({ action: "recalcularTabla" }).then(function(res) {
      if (res.ok) { state.tabla = res.tabla; flash("Tabla actualizada!"); }
      else flash("Error: " + (res.error||""), "#e74c3c");
      render();
    });
  };
}

render();
</script>
</body>
</html>
